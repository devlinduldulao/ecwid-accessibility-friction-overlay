<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Accessibility Friction Overlay Listing Banner</title>
  <desc id="desc">Banner artwork for the Ecwid merchant-facing accessibility control room.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcf7ec"/>
      <stop offset="100%" stop-color="#ead7b3"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#backdrop)"/>
  <circle cx="1290" cy="120" r="210" fill="#0f766e" opacity="0.12"/>
  <circle cx="290" cy="780" r="240" fill="#b46f36" opacity="0.12"/>
  <rect x="92" y="96" width="1416" height="708" rx="44" fill="#fffaf2" stroke="#1d2421" stroke-opacity="0.08"/>
