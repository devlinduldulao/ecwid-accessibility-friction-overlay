  <text x="162" y="352" font-family="Avenir Next, Segoe UI, sans-serif" font-size="34" fill="#44514c">Preview fake accessibility incidents, generate storefront snippets, and review friction hotspots</text>
  <text x="162" y="396" font-family="Avenir Next, Segoe UI, sans-serif" font-size="34" fill="#44514c">without adding a production database, Redis, or long-running Node server.</text>
