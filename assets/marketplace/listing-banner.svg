  <text x="202" y="534" font-family="American Typewriter, Courier New, monospace" font-size="22" font-weight="700" fill="#6b4e2f">PREVIEW MODE</text>
  <text x="202" y="592" font-family="Avenir Next, Segoe UI, sans-serif" font-size="58" font-weight="700" fill="#0f766e">6 warnings</text>
  <text x="202" y="640" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28" fill="#44514c">Synthetic checkout scenario running</text>
  <rect x="704" y="220" width="642" height="432" rx="30" fill="#fbf7ef" stroke="#1d2421" stroke-opacity="0.12"/>
  <rect x="750" y="282" width="220" height="120" rx="22" fill="#fff"/>
  <rect x="992" y="282" width="300" height="120" rx="22" fill="#fff"/>
  <rect x="750" y="426" width="542" height="44" rx="16" fill="#fff"/>
  <rect x="750" y="488" width="542" height="44" rx="16" fill="#fff"/>
  <rect x="750" y="550" width="542" height="44" rx="16" fill="#fff"/>
  <text x="778" y="336" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#1d2421">Keyboard trap risk</text>
  <text x="778" y="374" font-family="Avenir Next, Segoe UI, sans-serif" font-size="50" font-weight="700" fill="#b46f36">1</text>
  <text x="1020" y="336" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#1d2421">Focus visibility</text>
  <text x="1020" y="374" font-family="Avenir Next, Segoe UI, sans-serif" font-size="50" font-weight="700" fill="#0f766e">1</text>
  <text x="778" y="456" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24" fill="#1d2421">Dead Click · Checkout / Button / CTA Not Responding</text>
  <text x="778" y="518" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24" fill="#1d2421">Focus Visibility Issue · Checkout / Input / Missing Focus Indicator</text>
  <text x="778" y="580" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24" fill="#1d2421">Recovery · Checkout / Modal / Escape Released</text>
  <rect x="162" y="740" width="258" height="64" rx="32" fill="#0f766e"/>
  <text x="291" y="783" text-anchor="middle" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#fffaf2">Merchant QA First</text>
