name: Release Artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build static package
        run: npm run build

      - name: Create release archive
        run: |
          cd dist
          zip -r ../accessibility-friction-overlay-ecwid-dist.zip .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecwid-release-archive
          path: accessibility-friction-overlay-ecwid-dist.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: accessibility-friction-overlay-ecwid-dist.zip
